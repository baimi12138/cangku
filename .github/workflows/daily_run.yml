name: Fund_Arbitrage_Patrol
on:
  schedule:
    # 改成北京时间 09:15 (UTC 1:15) - 错开高峰
    - cron: '15 1 * * 1-5'
    # 改成北京时间 14:45 (UTC 6:45) - 午休后
    - cron: '45 6 * * 1-5'
  workflow_dispatch:
jobs:
  run_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests urllib3

      - name: Run Script
        env:
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          RECEIVER: ${{ secrets.RECEIVER }}
        run: python 基金套利.py
