# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>米粒LOF助手 - 你的全自动基金套利利润测算雷达</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;700;900&family=Fira+Code:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #50B7B7;
            --primary-dark: #3A9191;
            --secondary: #FF6B6B;
            --gold: #FFB84D;
            --bg: #FAFBFC;
            --card-bg: #FFFFFF;
            --text: #2C3E50;
            --text-light: #5A6C7D;
            --border: #E8ECEF;
            --shadow: rgba(80, 183, 183, 0.15);
            --shadow-hover: rgba(80, 183, 183, 0.3);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        nav.scrolled {
            box-shadow: 0 2px 30px rgba(0,0,0,0.1);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.5rem;
            color: var(--primary);
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            margin-top: 80px;
            background: linear-gradient(135deg, #50B7B7 0%, #3A9191 50%, #2C7373 100%);
            color: white;
            padding: 4rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120"><path d="M0,0 Q300,100 600,50 T1200,80 L1200,0 Z" fill="rgba(255,255,255,0.05)"/></svg>');
            background-size: cover;
            opacity: 0.3;
        }

        .hero-content {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 3rem;
            margin-bottom: 1rem;
            animation: fadeInDown 0.8s ease;
        }

        .hero .subtitle {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            animation: fadeInDown 0.8s ease 0.2s both;
        }

        .hero .description {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 2rem;
            opacity: 0.95;
            animation: fadeInUp 0.8s ease 0.4s both;
        }

        .cta-button {
            display: inline-block;
            background: var(--secondary);
            color: white;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.3);
            animation: fadeInUp 0.8s ease 0.6s both;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 107, 107, 0.4);
        }

        /* Image Placeholder */
        .img-placeholder {
            background: rgba(255,255,255,0.1);
            border: 3px dashed rgba(255,255,255,0.3);
            border-radius: 15px;
            padding: 3rem 2rem;
            margin: 2rem auto;
            text-align: center;
            max-width: 700px;
            animation: fadeInUp 0.8s ease 0.8s both;
        }

        .img-placeholder-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .img-placeholder-text {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        /* Section Titles */
        .section-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 3rem;
            color: var(--primary);
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 80px;
            height: 4px;
            background: var(--secondary);
            margin: 1rem auto 0;
            border-radius: 2px;
        }

        /* Story Box */
        .story-box {
            background: white;
            border-left: 5px solid var(--secondary);
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 40px var(--shadow);
            margin-bottom: 3rem;
            animation: fadeInLeft 0.8s ease;
        }

        .story-box h3 {
            color: var(--secondary);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .pain-points {
            list-style: none;
            margin: 1.5rem 0;
        }

        .pain-points li {
            padding: 1rem 0;
            padding-left: 2rem;
            position: relative;
            border-bottom: 1px solid var(--border);
        }

        .pain-points li:last-child {
            border-bottom: none;
        }

        .pain-points li::before {
            content: '❌';
            position: absolute;
            left: 0;
            font-size: 1.2rem;
        }

        .pain-points strong {
            color: var(--text);
        }

        .story-text {
            background: rgba(80, 183, 183, 0.05);
            padding: 1.5rem;
            border-radius: 10px;
            margin-top: 1.5rem;
            font-style: italic;
            line-height: 1.9;
        }

        /* Features Grid */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin: 3rem 0;
        }

        .feature-card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 5px 25px var(--shadow);
            transition: all 0.3s ease;
            animation: fadeInUp 0.8s ease;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px var(--shadow-hover);
        }

        .feature-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .feature-card h3 {
            color: var(--primary);
            font-size: 1.3rem;
            margin-bottom: 1rem;
        }

        /* Rules Panel */
        .rules-panel {
            background: linear-gradient(135deg, #FFF9E6 0%, #FFE6E6 100%);
            border: 2px solid var(--secondary);
            border-radius: 15px;
            padding: 2.5rem;
            margin: 3rem 0;
        }

        .rules-panel h3 {
            color: var(--secondary);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .rule-item {
            background: white;
            padding: 1.5rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--primary);
        }

        .rule-item h4 {
            color: var(--primary);
            margin-bottom: 0.8rem;
            font-size: 1.2rem;
        }

        .rule-item ul {
            margin-left: 1.5rem;
        }

        .rule-item li {
            margin: 0.5rem 0;
        }

        .formula {
            background: var(--text);
            color: white;
            padding: 1rem;
            border-radius: 8px;
            font-family: 'Fira Code', monospace;
            font-size: 1.1rem;
            text-align: center;
            margin: 1rem 0;
        }

        .warning {
            color: var(--secondary);
            font-weight: 700;
        }

        /* Pricing Cards */
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin: 3rem 0;
        }

        .pricing-card {
            background: white;
            border-radius: 20px;
            padding: 2.5rem 2rem;
            box-shadow: 0 10px 40px var(--shadow);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .pricing-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: var(--primary);
            transition: height 0.4s ease;
        }

        .pricing-card:hover::before {
            height: 100%;
            opacity: 0.05;
        }

        .pricing-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 20px 60px var(--shadow-hover);
        }

        .pricing-card.featured {
            border: 3px solid var(--gold);
            transform: scale(1.05);
        }

        .pricing-card.featured::before {
            background: var(--gold);
        }

        .pricing-badge {
            position: absolute;
            top: 20px;
            right: -30px;
            background: var(--gold);
            color: white;
            padding: 0.3rem 2rem;
            transform: rotate(45deg);
            font-size: 0.8rem;
            font-weight: 700;
        }

        .pricing-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .pricing-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .pricing-price {
            font-family: 'Fira Code', monospace;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary);
            margin: 1rem 0;
        }

        .pricing-price .currency {
            font-size: 1.5rem;
        }

        .pricing-period {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .pricing-features {
            list-style: none;
            margin: 1.5rem 0;
            text-align: left;
        }

        .pricing-features li {
            padding: 0.7rem 0;
            padding-left: 1.8rem;
            position: relative;
        }

        .pricing-features li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: var(--primary);
            font-weight: 700;
            font-size: 1.2rem;
        }

        /* Target Audience */
        .audience-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin: 3rem 0;
        }

        .audience-card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 25px var(--shadow);
            transition: all 0.3s ease;
        }

        .audience-card:hover {
            transform: scale(1.05);
        }

        .audience-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .audience-card h3 {
            color: var(--primary);
            margin-bottom: 0.8rem;
        }

        /* FAQ Section */
        .faq-container {
            max-width: 800px;
            margin: 3rem auto;
        }

        .faq-item {
            background: white;
            border-radius: 10px;
            margin-bottom: 1rem;
            box-shadow: 0 3px 15px var(--shadow);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .faq-question {
            padding: 1.5rem 2rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            color: var(--text);
            transition: all 0.3s ease;
        }

        .faq-question:hover {
            background: rgba(80, 183, 183, 0.05);
            color: var(--primary);
        }

        .faq-icon {
            font-size: 1.5rem;
            transition: transform 0.3s ease;
        }

        .faq-item.active .faq-icon {
            transform: rotate(180deg);
        }

        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.4s ease;
            padding: 0 2rem;
        }

        .faq-item.active .faq-answer {
            max-height: 500px;
            padding: 0 2rem 1.5rem 2rem;
        }

        .faq-answer p {
            line-height: 1.8;
            color: var(--text-light);
        }

        /* Payment Section */
        .payment-box {
            background: white;
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
            box-shadow: 0 10px 50px var(--shadow);
            margin: 3rem 0;
        }

        .qr-placeholder {
            width: 300px;
            height: 300px;
            margin: 2rem auto;
            background: rgba(80, 183, 183, 0.05);
            border: 3px dashed var(--primary);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .qr-placeholder-icon {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        /* Footer */
        footer {
            background: var(--text);
            color: white;
            padding: 3rem 2rem;
            text-align: center;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-links {
            margin: 1.5rem 0;
        }

        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            margin: 0 1rem;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: white;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }

            .hero .subtitle {
                font-size: 1.2rem;
            }

            .nav-links {
                gap: 1rem;
                font-size: 0.9rem;
            }

            .section-title {
                font-size: 2rem;
            }

            .pricing-grid,
            .features-grid,
            .audience-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav id="navbar">
        <div class="nav-container">
            <div class="logo">米粒LOF助手 📡</div>
            <ul class="nav-links">
                <li><a href="#features">功能</a></li>
                <li><a href="#pricing">订阅</a></li>
                <li><a href="#faq">FAQ</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>米粒LOF助手 📡</h1>
            <div class="subtitle">别再人工盯盘了!你的全自动"基金套利"利润测算雷达</div>
            <p class="description">
                全市场 LOF / QDII 溢价实时监控,精准扣除申购费与最低佣金。工具会在发现机会时,主动告诉你今日可套利的优质品种。不仅告诉你"买什么",更精准算出"赚多少"。<br>
                每天只需 3 秒钟看邮件,轻松决定上不上车,彻底告别枯燥的手动盯盘!
            </p>
            <a href="#pricing" class="cta-button">立即订阅</a>

            <!-- Image Placeholder 1: Email Preview -->
            <div class="img-placeholder">
                <div class="img-placeholder-icon">📧</div>
                <div class="img-placeholder-text">
                    【图片位置1】邮箱/微信实际推送效果截图<br>
                    建议:放一张精美的邮件 HTML 卡片截图,重要数据如"预期利润"、"单日/月攒收益"标红加粗,体现"所见即所得"
                </div>
            </div>
        </div>
    </section>

    <!-- Story & Pain Points -->
    <section class="container">
        <h2 class="section-title">🤔 你是否也经历过这些"套利踩坑"?</h2>
        
        <div class="story-box">
            <h3>常见的套利痛点</h3>
            <ul class="pain-points">
                <li><strong>每天盯盘太心累:</strong> 几百只 LOF 基金,每天挨个看溢价率和限额,密密麻麻的表格看得眼都花了?</li>
                <li><strong>算错手续费被"反撸":</strong> 看着溢价挺高,结果没算清券商"单笔最低 0.2 元"的佣金,一顿操作猛如虎,一看利润负两毛?</li>
                <li><strong>容易错过大肥肉:</strong> 像白银基金那种突然拉起来的机会,等别人传人我才知道,肉汤都没了。</li>
                <li><strong>搞错规则白占资金:</strong> 忘了沪市单户限制,或者不知道 QDII 是 T+3 交收,导致资金无效站岗?</li>
            </ul>

            <div class="story-text">
                <h4 style="color: var(--primary); margin-bottom: 1rem;">我为什么要做这个工具?</h4>
                一开始,我自己每天刷表也刷得心力交瘁。溢价高的大机会很少出现,却要每天持续盯着,还要自己心算"溢价率减去申购费 + 卖出佣金后到底能赚多少"。<br><br>
                思来想去,我就花了好几天自己手搓了个小脚本:每天自动监控、筛选、计算、发邮件。前前后后用了几个月优化抓取逻辑和排版,才达到现在的效果。<br><br>
                现在用了之后,腰不疼了、眼不花了、上楼都有力气了(开个玩笑😂)。每天早上打开邮箱,只看一眼符合条件的推送,照着申购就完事了。没有达标的机会,它就安静地不打扰我,超级省心!
            </div>
        </div>
    </section>

    <!-- Features Section -->
    <section id="features" class="container">
        <h2 class="section-title">✨ 别再人工盯盘了,让工具为你打工</h2>
        
        <div class="features-grid">
            <div class="feature-card">
                <div class="feature-icon">🌐</div>
                <h3>全市场实时扫描<br>绝不漏一个"钢镚"</h3>
                <p>自动对接云端数据源,剔除无法套利的普通 ETF,只把有溢价、开放申购的优质标的送到你面前。省下每天 1 小时的搜集时间,摸鱼搞钱两不误。</p>
            </div>

            <div class="feature-card">
                <div class="feature-icon">🧮</div>
                <h3>极其硬核的"净利润"计算器<br>(独家!)</h3>
                <p>这绝不是一个只展示"溢价率"的半成品。系统自动按申购费打一折扣除,并严格计算券商单笔最低 0.2 元(或万一)的佣金。多账户收益自动叠加,报告上写着赚 2 块,落袋就是赚 2 块!</p>
            </div>

            <div class="feature-card">
                <div class="feature-icon">🛡️</div>
                <h3>智能风控过滤系统<br>把风险挡在门外</h3>
                <p>保住本金比赚取溢价更重要。自动拦截微小额度的高波动基金(如 10 元限额原油,避免 T+3 暴跌风险)。根据限额自动动态调整报警线,拒绝无效信息轰炸。</p>
            </div>

            <div class="feature-card">
                <div class="feature-icon">📅</div>
                <h3>独创"单日"与"月攒"<br>双轨收益策略</h3>
                <p>针对 10 元限额基金,系统自动测算连攒 20 天卖出的收益,帮你狂省 95% 券商最低佣金,蚊子腿经过复利也能变大肉。</p>
            </div>

            <div class="feature-card">
                <div class="feature-icon">💡</div>
                <h3>贴心的"保姆级"<br>战术备注</h3>
                <p>推送自带战术小抄:标普500提示 T+3 到账;沪市 5 开头警告单户限制;161226 等标注唯一身份证标的。节假日 A 股不开盘,工具自动休眠不打扰。</p>
            </div>

            <div class="feature-card">
                <div class="feature-icon">⏰</div>
                <h3>精准时间推送<br>避开早盘波动</h3>
                <p>每天上午 10:35 准时发送,这是精心选择的时间节点,避开了早盘波动最剧烈的时刻,让你在相对稳定的时段做决策。</p>
            </div>
        </div>
    </section>

    <!-- Rules & Formula -->
    <section class="container">
        <h2 class="section-title">⚠️ 硬核规则与说明</h2>
        
        <div class="rules-panel">
